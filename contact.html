<!-- HEADER -->
<header class="text-center hero" style="margin-top:80px;">
  <div class="container welcome">
    <h1 class="text-dark-purple">Contact Us</h1>
    <p class="lead">We’ll get back to you soon</p>
  </div>
</header>

<!-- FORM -->
<main class="container mt-5">

  <h2 class="text-center mb-4">
    Complete the form below and one of our staff members will contact you
  </h2>

  <form class="row g-4 justify-content-center">

    <div class="col-md-5">
      <label class="form-label">First Name</label>
      <input type="text" class="form-control">
    </div>

    <div class="col-md-5">
      <label class="form-label">Last Name</label>
      <input type="text" class="form-control">
    </div>

    <div class="col-md-5">
      <label class="form-label">Email</label>
      <input type="email" class="form-control">
    </div>

    <div class="col-md-5">
      <label class="form-label">Phone</label>
      <input type="tel" class="form-control">
    </div>

    <div class="col-10 text-center mt-3">
      <p>I am interested in:</p>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Guitar Lessons</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Piano Lessons</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Violin Lessons</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Rental Equipment</label>
      </div>
    </div>

    <div class="col-12 text-center mt-4">
      <button type="submit" class="btn bg-dark-purple text-white px-4">
        Submit
      </button>
    </div>

  </form>

</main>
