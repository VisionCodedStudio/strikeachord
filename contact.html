<section class="container mt-5">

  <h2 class="text-center mb-4">
    Complete the form below and one of our staff members will contact you.
  </h2>

  <form>

    <!-- ROW 1 -->
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">First Name</label>
        <input type="text" class="form-control" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-control" required>
      </div>
    </div>

    <!-- ROW 2 -->
    <div class="row mb-4">
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-control" required>
      </div>
    </div>

    <!-- CHECKBOX SECTION (FIXED CENTER) -->
    <div class="text-center mb-4">

      <p>I am interested in:</p>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Guitar Lessons</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Piano Lessons</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Violin Lessons</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Rental Equipment</label>
      </div>

    </div>

    <!-- BUTTON CENTERED -->
    <div class="text-center">
      <button class="btn bg-dark-purple text-white px-4">
        Submit
      </button>
    </div>

  </form>

</section>
